mutation CreateExamSessionMutation(
  $description: String = ""
  $classId: ID = ""
  $creatorId: ID!
  $endTime: String = ""
  $examId: ID = ""
  $startTime: String = ""
) {
  createExamSession(
    input: {
      examId: $examId
      classId: $classId
      creatorId: $creatorId
      description: $description
      startTime: $startTime
      endTime: $endTime
    }
  ) {
    createdAt
    updatedAt
    startTime
    status
    id
    creatorId
    description
    endTime
    class {
      name
      id
    }
    exam {
      id
      name
    }
  }
}
